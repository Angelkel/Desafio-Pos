name: 'CI - Integrated Execution'

on:
  workflow_dispatch:

  push:
    branches:
      - main

  schedule:
    - cron: '0 23 * * 2'

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Executar testes e gerar relatório
        run: npm run test:report

      - name: Armazenar relatório na pipeline
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: relatorio-testes-mocha
          path: reports/
          retention-days: 30